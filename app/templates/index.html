<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OTRAK Agreement Search</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; }
    input { padding: 0.5rem; width: 100%; max-width: 700px; }
    .result { border: 1px solid #ddd; padding: 1rem; margin: 1rem 0; }
    .source { font-weight: 600; }
    .score { color: #666; font-size: 0.9rem; }
    textarea { width: 100%; height: 140px; }
  </style>
</head>
<body>
  <h1>OTRAK Agreement Search</h1>
  <form method="post">
    <label>Query</label><br/>
    <input name="q" value="{{ q }}" placeholder="e.g., overtime premium" />
    <br/><br/>
    <label>Trade (optional)</label><br/>
    <input name="trade" value="{{ trade }}" placeholder="e.g., IBEW" />
    <br/><br/>
    <label>Agreement name (optional)</label><br/>
    <input name="agreement" value="{{ agreement }}" placeholder="e.g., Nuclear Project" />
    <br/><br/>
    <button type="submit">Search</button>
  </form>

  {% for r in results %}
    <div class="result">
      <div class="source">{{ r.source }}</div>
      <div class="score">score: {{ '%.4f'|format(r.score) }}</div>
      <pre>{{ r.text }}</pre>
    </div>
  {% endfor %}
</body>
</html>
