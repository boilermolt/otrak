<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>OTRAK Agreement Chat</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background:#f6f7f9; }
    header { background:#111827; color:#fff; padding:1rem 2rem; }
    main { max-width: 900px; margin: 0 auto; padding: 2rem; }
    .chat { background:#fff; border-radius:12px; padding:1rem; box-shadow:0 1px 4px rgba(0,0,0,0.08); }
    .bubble { padding:0.75rem 1rem; border-radius:16px; margin:0.75rem 0; max-width:80%; }
    .user { background:#dbeafe; margin-left:auto; }
    .assistant { background:#f3f4f6; }
    .meta { font-size:0.85rem; color:#6b7280; margin-top:0.25rem; }
    form { margin-top:1rem; }
    input[type=text] { width:100%; padding:0.7rem; border:1px solid #ddd; border-radius:8px; }
    .row { display:flex; gap:0.75rem; margin-top:0.75rem; }
    .row input { flex:1; }
    .actions { display:flex; gap:0.75rem; align-items:center; margin-top:0.75rem; }
    button { background:#111827; color:#fff; border:none; padding:0.6rem 1rem; border-radius:8px; cursor:pointer; }
    details { margin-top:0.5rem; }
    pre { white-space: pre-wrap; }
  </style>
</head>
<body>
  <header>
    <h2>OTRAK Agreement Chat</h2>
  </header>
  <main>
    <div class="chat">
      {% if q %}
        <div class="bubble user">
          {{ q }}
        </div>
      {% endif %}

      {% if results %}
        <div class="bubble assistant">
          <strong>Top results</strong>
          <div class="meta">Showing {{ results|length }} results</div>
          {% for r in results %}
            <details>
              <summary>{{ r.source }} · score {{ '%.4f'|format(r.score) }}</summary>
              <pre>{{ r.text }}</pre>
            </details>
          {% endfor %}
        </div>
      {% elif q %}
        <div class="bubble assistant">No results found.</div>
      {% endif %}
    </div>

    <form method="post">
      <input name="q" placeholder="Ask about overtime, rest periods, premiums…" value="{{ q }}" />
      <div class="row">
        <input name="trade" placeholder="Trade (optional)" value="{{ trade }}" />
        <input name="agreement" placeholder="Agreement (optional)" value="{{ agreement }}" />
        <input name="top_k" placeholder="Top‑K" value="{{ top_k }}" />
      </div>
      <div class="actions">
        <button type="submit">Ask</button>
      </div>
    </form>
  </main>
</body>
</html>
